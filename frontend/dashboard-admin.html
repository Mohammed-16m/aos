<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin — Réservations</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a26;
            --border: rgba(255,255,255,0.07); --gold: #c9a84c;
            --gold-dim: rgba(201,168,76,0.12); --text: #f0ede8;
            --text-muted: #8a8490; --text-dim: #5a5560;
            --red: #e05a5a; --green: #5abf8a; --sidebar-w: 260px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; }
        .sidebar { width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); min-height: 100vh; display: flex; flex-direction: column; padding: 30px 20px; position: fixed; top: 0; left: 0; }
        .sidebar-logo { text-align: center; margin-bottom: 36px; }
        .sidebar-logo .brand { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--gold); }
        .sidebar-logo .tagline { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); margin-top: 4px; }
        .sidebar-divider { height: 1px; background: var(--border); margin-bottom: 24px; }
        .sidebar-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-dim); padding: 0 12px; margin-bottom: 10px; }
        .sidebar nav a { display: flex; align-items: center; gap: 12px; color: var(--text-muted); text-decoration: none; padding: 11px 14px; border-radius: 10px; font-size: 14px; font-weight: 500; margin-bottom: 4px; transition: all 0.2s; }
        .sidebar nav a:hover { background: var(--gold-dim); color: var(--gold); }
        .sidebar nav a.active { background: var(--gold-dim); color: var(--gold); border: 1px solid rgba(201,168,76,0.2); }
        .sidebar nav a .icon { font-size: 16px; }
        .sidebar-footer { margin-top: auto; }
        .logout-btn { display: flex; align-items: center; gap: 12px; width: 100%; background: rgba(224,90,90,0.1); border: 1px solid rgba(224,90,90,0.2); color: var(--red); padding: 11px 14px; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
        .logout-btn:hover { background: rgba(224,90,90,0.2); }
        .main { margin-left: var(--sidebar-w); padding: 36px 40px; width: 100%; min-height: 100vh; }
        .page-header { margin-bottom: 30px; }
        .page-header h1 { font-family: 'Playfair Display', serif; font-size: 28px; color: var(--text); }
        .page-header p { color: var(--text-muted); font-size: 14px; margin-top: 4px; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px; }
        .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; }
        .stat-card .stat-label { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; }
        .stat-card .stat-value { font-family: 'Playfair Display', serif; font-size: 32px; color: var(--gold); }
        .filters { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 20px; }
        .filters input, .filters select { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 9px 14px; font-size: 13px; font-family: 'DM Sans', sans-serif; outline: none; }
        .filters select option { background: var(--surface2); }
        .btn-filter { background: var(--gold); color: #0a0a0f; border: none; padding: 9px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; }
        .btn-reset { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); padding: 9px 18px; border-radius: 8px; font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
        .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        thead th { background: var(--surface2); padding: 14px 18px; text-align: left; font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); border-bottom: 1px solid var(--border); }
        tbody td { padding: 14px 18px; font-size: 14px; color: var(--text-muted); border-bottom: 1px solid var(--border); }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover td { background: rgba(255,255,255,0.02); color: var(--text); }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .badge.EN_ATTENTE { background: rgba(243,156,18,0.15); color: #f39c12; }
        .badge.CONFIRMEE  { background: rgba(90,191,138,0.15); color: var(--green); }
        .badge.ANNULEE    { background: rgba(224,90,90,0.15);  color: var(--red); }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-dim); font-size: 14px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-logo">
        <div class="brand">TableVista</div>
        <div class="tagline">Admin Panel</div>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-label">Navigation</div>
    <nav>
        <a href="dashboard-admin.html" class="active">
            <span class="icon">📋</span> Réservations
        </a>
        <a href="admin-table.html">
            <span class="icon">🪑</span> Gestion Tables
        </a>
    </nav>
    <div class="sidebar-footer">
        <button class="logout-btn" onclick="logout()">
            <span>⎋</span> Déconnexion
        </button>
    </div>
</div>

<div class="main">
    <div class="page-header">
        <h1>Toutes les Réservations</h1>
        <p>Vue d'ensemble de toutes les réservations clients</p>
    </div>
    <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value" id="stat-total">—</div></div>
        <div class="stat-card"><div class="stat-label">Confirmées</div><div class="stat-value" id="stat-confirmees" style="color:var(--green)">—</div></div>
        <div class="stat-card"><div class="stat-label">En attente</div><div class="stat-value" id="stat-attente" style="color:#f39c12">—</div></div>
    </div>
    <div class="filters">
        <input type="date" id="filter-date">
        <select id="filter-statut">
            <option value="">Tous les statuts</option>
            <option value="EN_ATTENTE">En attente</option>
            <option value="CONFIRMEE">Confirmée</option>
            <option value="ANNULEE">Annulée</option>
        </select>
        <button class="btn-filter" onclick="chargerReservations()">🔍 Filtrer</button>
        <button class="btn-reset" onclick="resetFiltres()">↺ Reset</button>
    </div>
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>#ID</th><th>Client ID</th><th>Table</th>
                    <th>Date</th><th>Heure</th><th>Personnes</th><th>Statut</th>
                </tr>
            </thead>
            <tbody id="reservations-body">
                <tr><td colspan="7" class="empty-state">Chargement...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const token = localStorage.getItem('access');
    const role  = localStorage.getItem('role');

    if (!token || role !== 'ADMIN') {
        window.location.href = 'login.html';
    }

    async function chargerReservations() {
        const date   = document.getElementById('filter-date').value;
        const statut = document.getElementById('filter-statut').value;
        let url = 'http://localhost:8083/api/reservations/all/';
        const params = [];
        if (date)   params.push(`date=${date}`);
        if (statut) params.push(`statut=${statut}`);
        if (params.length) url += '?' + params.join('&');

        try {
            const res  = await fetch(url, { headers: { 'Authorization': 'Bearer ' + token } });
            const data = await res.json();
            if (res.status === 403) {
                document.getElementById('reservations-body').innerHTML = '<tr><td colspan="7" class="empty-state">🔒 Accès refusé</td></tr>';
                return;
            }
            const reservations = data.data || [];
            document.getElementById('stat-total').textContent      = reservations.length;
            document.getElementById('stat-confirmees').textContent  = reservations.filter(r => r.statut === 'CONFIRMEE').length;
            document.getElementById('stat-attente').textContent     = reservations.filter(r => r.statut === 'EN_ATTENTE').length;
            const tbody = document.getElementById('reservations-body');
            if (!reservations.length) {
                tbody.innerHTML = '<tr><td colspan="7" class="empty-state">📭 Aucune réservation trouvée</td></tr>';
                return;
            }
            tbody.innerHTML = reservations.map(r => `
                <tr>
                    <td style="color:var(--gold);font-weight:600">#${r.id}</td>
                    <td>${r.client_id}</td><td>Table ${r.table_id}</td>
                    <td>${r.date}</td><td>${r.heure}</td>
                    <td>${r.nb_personnes} pers.</td>
                    <td><span class="badge ${r.statut}">${r.statut.replace('_', ' ')}</span></td>
                </tr>
            `).join('');
        } catch (e) {
            document.getElementById('reservations-body').innerHTML = '<tr><td colspan="7" class="empty-state">⚠️ Impossible de contacter le serveur</td></tr>';
        }
    }

    function resetFiltres() {
        document.getElementById('filter-date').value   = '';
        document.getElementById('filter-statut').value = '';
        chargerReservations();
    }

    function logout() {
        localStorage.clear();
        window.location.href = 'login.html';
    }

    chargerReservations();
</script>
</body>
</html>

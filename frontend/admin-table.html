<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Gestion des Tables</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a26;
            --border: rgba(255,255,255,0.07); --gold: #c9a84c;
            --gold-dim: rgba(201,168,76,0.12); --text: #f0ede8;
            --text-muted: #8a8490; --text-dim: #5a5560;
            --red: #e05a5a; --green: #5abf8a; --blue: #5a8fe0; --sidebar-w: 260px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; }

        /* ── SIDEBAR ── */
        .sidebar { width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); min-height: 100vh; display: flex; flex-direction: column; padding: 30px 20px; position: fixed; top: 0; left: 0; }
        .sidebar-logo { text-align: center; margin-bottom: 36px; }
        .sidebar-logo .brand { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--gold); }
        .sidebar-logo .tagline { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); margin-top: 4px; }
        .sidebar-divider { height: 1px; background: var(--border); margin-bottom: 24px; }
        .sidebar-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-dim); padding: 0 12px; margin-bottom: 10px; }
        .sidebar nav a { display: flex; align-items: center; gap: 12px; color: var(--text-muted); text-decoration: none; padding: 11px 14px; border-radius: 10px; font-size: 14px; font-weight: 500; margin-bottom: 4px; transition: all 0.2s; }
        .sidebar nav a:hover { background: var(--gold-dim); color: var(--gold); }
        .sidebar nav a.active { background: var(--gold-dim); color: var(--gold); border: 1px solid rgba(201,168,76,0.2); }
        .sidebar nav a .icon { font-size: 16px; }
        .sidebar-footer { margin-top: auto; }
        .logout-btn { display: flex; align-items: center; gap: 12px; width: 100%; background: rgba(224,90,90,0.1); border: 1px solid rgba(224,90,90,0.2); color: var(--red); padding: 11px 14px; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
        .logout-btn:hover { background: rgba(224,90,90,0.2); }

        /* ── MAIN ── */
        .main { margin-left: var(--sidebar-w); padding: 36px 40px; width: 100%; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; }
        .page-header h1 { font-family: 'Playfair Display', serif; font-size: 28px; }
        .page-header p { color: var(--text-muted); font-size: 14px; margin-top: 4px; }
        .btn-ajouter { background: var(--green); color: #0a0a0f; border: none; padding: 11px 22px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; white-space: nowrap; transition: opacity 0.2s; }
        .btn-ajouter:hover { opacity: 0.85; }

        /* ── TOAST ── */
        .toast { position: fixed; top: 24px; right: 24px; padding: 14px 22px; border-radius: 10px; font-size: 14px; font-weight: 500; z-index: 9999; opacity: 0; transform: translateY(-10px); transition: all 0.3s; pointer-events: none; }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.success { background: rgba(90,191,138,0.15); border: 1px solid rgba(90,191,138,0.3); color: var(--green); }
        .toast.error   { background: rgba(224,90,90,0.15);  border: 1px solid rgba(224,90,90,0.3);  color: var(--red); }

        /* ── TABLE ── */
        .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        thead th { background: var(--surface2); padding: 14px 18px; text-align: left; font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); border-bottom: 1px solid var(--border); }
        tbody td { padding: 14px 18px; font-size: 14px; color: var(--text-muted); border-bottom: 1px solid var(--border); }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover td { background: rgba(255,255,255,0.02); color: var(--text); }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .badge.disponible   { background: rgba(90,191,138,0.15); color: var(--green); }
        .badge.indisponible { background: rgba(224,90,90,0.15);  color: var(--red); }
        .btn-modifier { background: rgba(90,143,224,0.15); border: 1px solid rgba(90,143,224,0.2); color: var(--blue); padding: 6px 14px; border-radius: 7px; font-size: 12px; font-weight: 600; cursor: pointer; margin-right: 6px; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
        .btn-modifier:hover { background: rgba(90,143,224,0.25); }
        .btn-supprimer { background: rgba(224,90,90,0.12); border: 1px solid rgba(224,90,90,0.2); color: var(--red); padding: 6px 14px; border-radius: 7px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
        .btn-supprimer:hover { background: rgba(224,90,90,0.22); }
        .empty-state { text-align: center; padding: 60px; color: var(--text-dim); font-size: 14px; }

        /* ── MODAL ── */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal-overlay.active { display: flex; }
        .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px; width: 460px; max-width: 92vw; }
        .modal h3 { font-family: 'Playfair Display', serif; font-size: 22px; margin-bottom: 8px; color: var(--text); }
        .modal-subtitle { font-size: 13px; color: var(--text-dim); margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 7px; }
        .form-group input, .form-group select { width: 100%; padding: 11px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 9px; color: var(--text); font-size: 14px; font-family: 'DM Sans', sans-serif; outline: none; transition: border-color 0.2s; }
        .form-group input:focus, .form-group select:focus { border-color: rgba(201,168,76,0.4); }
        .form-group select option { background: var(--surface2); }
        .modal-buttons { display: flex; gap: 10px; margin-top: 24px; }
        .btn-save { flex: 1; background: var(--gold); color: #0a0a0f; border: none; padding: 12px; border-radius: 9px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: opacity 0.2s; }
        .btn-save:hover { opacity: 0.85; }
        .btn-cancel { flex: 1; background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); padding: 12px; border-radius: 9px; font-size: 14px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
        .btn-cancel:hover { color: var(--text); }

        /* ── INFO BOX ── */
        .info-box { background: rgba(201,168,76,0.08); border: 1px solid rgba(201,168,76,0.2); border-radius: 8px; padding: 10px 14px; margin-bottom: 20px; font-size: 12px; color: var(--gold); display: none; }
    </style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="sidebar-logo">
        <div class="brand">TableVista</div>
        <div class="tagline">Admin Panel</div>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-label">Navigation</div>
    <nav>
        <a href="dashboard-admin.html">
            <span class="icon">📋</span> Réservations
        </a>
        <a href="admin-table.html" class="active">
            <span class="icon">🪑</span> Gestion Tables
        </a>
    </nav>
    <div class="sidebar-footer">
        <button class="logout-btn" onclick="logout()">
            <span>⎋</span> Déconnexion
        </button>
    </div>
</div>

<!-- MAIN -->
<div class="main">
    <div class="page-header">
        <div>
            <h1>Gestion des Tables</h1>
            <p>Ajouter, modifier ou supprimer les tables du restaurant</p>
        </div>
        <button class="btn-ajouter" onclick="ouvrirModalAjouter()">+ Ajouter une table</button>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Numéro</th>
                    <th>Capacité</th>
                    <th>Localisation</th>
                    <th>Statut</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tables-body">
                <tr><td colspan="6" class="empty-state">Chargement...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
    <div class="modal">
        <h3 id="modal-titre">Ajouter une table</h3>
        <p class="modal-subtitle" id="modal-subtitle"></p>
        <input type="hidden" id="table-id">

        <!-- Info box numéro auto -->
        <div class="info-box" id="info-numero">
            ℹ️ Le numéro de la table est attribué automatiquement par le système.
        </div>

        <!-- Champ numéro — caché dans les deux cas -->
        <div class="form-group" id="groupe-numero" style="display:none;">
            <label>Numéro de la table</label>
            <input type="number" id="input-numero" placeholder="Auto-généré" min="1">
        </div>

        <div class="form-group">
            <label>Capacité (personnes)</label>
            <input type="number" id="input-capacite" placeholder="Ex: 4" min="1" max="20">
        </div>

        <div class="form-group">
            <label>Localisation</label>
            <select id="input-localisation">
                <option value="interieur">Intérieur</option>
                <option value="terrasse">Terrasse</option>
                <option value="salon_prive">Salon Privé</option>
            </select>
        </div>

        <div class="form-group">
            <label>Statut</label>
            <select id="input-statut">
                <option value="disponible">Disponible</option>
                <option value="indisponible">Indisponible</option>
            </select>
        </div>

        <div class="modal-buttons">
            <button class="btn-save"   onclick="sauvegarderTable()">💾 Sauvegarder</button>
            <button class="btn-cancel" onclick="fermerModal()">Annuler</button>
        </div>
    </div>
</div>

<script>
    const token = localStorage.getItem('access');
    const role  = localStorage.getItem('role');

    if (!token || role !== 'ADMIN') {
        window.location.href = 'login.html';
    }

    // ── Charger les tables ──
    async function chargerTables() {
        try {
            const res  = await fetch('http://localhost:8082/api/tables/', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const data = await res.json();
            afficherTables(data.data || []);
        } catch (e) {
            document.getElementById('tables-body').innerHTML =
                '<tr><td colspan="6" class="empty-state">⚠️ Impossible de contacter le serveur</td></tr>';
        }
    }

    // ── Afficher les tables ──
    function afficherTables(tables) {
        const tbody = document.getElementById('tables-body');
        if (!tables.length) {
            tbody.innerHTML = '<tr><td colspan="6" class="empty-state">📭 Aucune table trouvée</td></tr>';
            return;
        }
        tbody.innerHTML = tables.map((t, i) => `
            <tr>
                <td style="color:var(--gold);font-weight:600">${i + 1}</td>
                <td><strong style="color:var(--text)">Table ${t.numero}</strong></td>
                <td>${t.capacite} personnes</td>
                <td style="text-transform:capitalize">${t.localisation.replace('_', ' ')}</td>
                <td><span class="badge ${t.statut}">${t.statut}</span></td>
                <td>
                    <button class="btn-modifier"
                        onclick="ouvrirModalModifier(${t.id}, '${t.numero}', ${t.capacite}, '${t.localisation}', '${t.statut}')">
                        ✏️ Modifier
                    </button>
                    <button class="btn-supprimer" onclick="supprimerTable(${t.id})">
                        🗑️ Supprimer
                    </button>
                </td>
            </tr>
        `).join('');
    }

    // ── Modal Ajouter ──
    function ouvrirModalAjouter() {
        document.getElementById('modal-titre').textContent    = 'Ajouter une table';
        document.getElementById('modal-subtitle').textContent = 'Remplissez les informations de la nouvelle table';
        document.getElementById('table-id').value            = '';
        document.getElementById('input-numero').value        = '';
        document.getElementById('input-capacite').value      = '';
        document.getElementById('input-localisation').value  = 'interieur';
        document.getElementById('input-statut').value        = 'disponible';
        // Numéro caché — auto-généré par le backend
        document.getElementById('groupe-numero').style.display = 'none';
        document.getElementById('info-numero').style.display   = 'block';
        document.getElementById('modal-overlay').classList.add('active');
    }

    // ── Modal Modifier ──
    function ouvrirModalModifier(id, numero, capacite, localisation, statut) {
        document.getElementById('modal-titre').textContent    = 'Modifier la table';
        document.getElementById('modal-subtitle').textContent = `Table n°${numero} — le numéro ne peut pas être modifié`;
        document.getElementById('table-id').value            = id;
        document.getElementById('input-numero').value        = numero;
        document.getElementById('input-capacite').value      = capacite;
        document.getElementById('input-localisation').value  = localisation;
        document.getElementById('input-statut').value        = statut;
        // Numéro caché — non modifiable
        document.getElementById('groupe-numero').style.display = 'none';
        document.getElementById('info-numero').style.display   = 'none';
        document.getElementById('modal-overlay').classList.add('active');
    }

    function fermerModal() {
        document.getElementById('modal-overlay').classList.remove('active');
    }

    // ── Sauvegarder (Ajouter ou Modifier) ──
    async function sauvegarderTable() {
        const id           = document.getElementById('table-id').value;
        const capacite     = document.getElementById('input-capacite').value;
        const localisation = document.getElementById('input-localisation').value;
        const statut       = document.getElementById('input-statut').value;

        if (!capacite) {
            afficherToast('Veuillez remplir la capacité', 'error');
            return;
        }

        const body = JSON.stringify({
            capacite:     parseInt(capacite),
            localisation,
            statut
        });

        try {
            let res;
            if (id) {
                // ✅ Modifier — PUT /api/tables/{id}/
                res = await fetch(`http://localhost:8082/api/tables/${id}/`, {
                    method: 'PUT', 
                    headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                    },
                    body
                });
            } else {
                // ✅ Ajouter — POST /api/tables/ (numéro auto côté backend)
                res = await fetch('http://localhost:8082/api/tables/', {
                    method: 'POST',
                        headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                        },
                    body
                });
            }

            const data = await res.json();

            if (data.status === 'success') {
                fermerModal();
                chargerTables();
                afficherToast(id ? '✅ Table modifiée !' : '✅ Table ajoutée !', 'success');
            } else {
                afficherToast('❌ ' + (data.message || JSON.stringify(data.errors) || 'Erreur'), 'error');
            }
        } catch (e) {
            afficherToast('❌ Erreur de connexion', 'error');
        }
    }

    // ── Supprimer ──
    async function supprimerTable(id) {
        if (!confirm('Supprimer cette table définitivement ?')) return;
        try {
            const res  = await fetch(`http://localhost:8082/api/tables/${id}/`, {
                method: 'DELETE',
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const data = await res.json();
            if (data.status === 'success') {
                chargerTables();
                afficherToast('✅ Table supprimée', 'success');
            } else {
                afficherToast('❌ ' + (data.message || 'Erreur'), 'error');
            }
        } catch (e) {
            afficherToast('❌ Erreur de connexion', 'error');
        }
    }

    // ── Toast ──
    function afficherToast(msg, type) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = `toast ${type} show`;
        setTimeout(() => t.className = 'toast', 3000);
    }

    // ── Logout ──
    function logout() {
        localStorage.clear();
        window.location.href = 'login.html';
    }

    chargerTables();
</script>
</body>
</html>

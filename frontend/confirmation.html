<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TableVista — Confirmation</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface2: #1a1a26;
            --border: rgba(255,255,255,0.07);
            --gold: #c9a84c;
            --gold-dim: rgba(201,168,76,0.12);
            --text: #f0ede8;
            --text-muted: #8a8490;
            --text-dim: #5a5560;
            --red: #e05a5a;
            --green: #5abf8a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(90,191,138,0.05), transparent);
            top: -150px; right: -150px;
            border-radius: 50%;
            pointer-events: none;
        }

        /* ── NAV ── */
        .topnav {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 60px;
            background: rgba(10,10,15,0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 28px;
            z-index: 100;
        }

        .topnav .brand {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            color: var(--gold);
            text-decoration: none;
        }

        .topnav-actions { display: flex; gap: 10px; }

        .btn-nav {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 7px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .btn-back {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text-muted);
        }

        .btn-back:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }

        .btn-home {
            background: var(--gold-dim);
            border: 1px solid rgba(201,168,76,0.2);
            color: var(--gold);
        }

        .btn-home:hover { background: rgba(201,168,76,0.2); }

        /* ── CARD ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px 36px;
            width: 100%;
            max-width: 480px;
            margin-top: 60px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .success-icon {
            width: 72px; height: 72px;
            border-radius: 50%;
            background: rgba(90,191,138,0.12);
            border: 2px solid rgba(90,191,138,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto 20px;
        }

        .card h2 {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            color: var(--text);
            margin-bottom: 6px;
        }

        .card .subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 28px;
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin-bottom: 24px;
        }

        /* INFO ROWS */
        .info-grid {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 28px;
            text-align: left;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 13px 18px;
            border-bottom: 1px solid var(--border);
        }

        .info-row:last-child { border-bottom: none; }

        .info-row .key {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .info-row .val {
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
        }

        .badge-statut {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            background: rgba(90,191,138,0.15);
            color: var(--green);
            border: 1px solid rgba(90,191,138,0.25);
        }

        /* BUTTONS */
        .btn-actions {
            display: flex;
            gap: 10px;
        }

        .btn-primary {
            flex: 1;
            padding: 13px;
            background: linear-gradient(135deg, var(--gold), #a07828);
            border: none;
            border-radius: 10px;
            color: #0a0a0f;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: opacity 0.2s;
        }

        .btn-primary:hover { opacity: 0.85; }

        .btn-secondary {
            flex: 1;
            padding: 13px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-muted);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .btn-secondary:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }

        .empty {
            color: var(--text-dim);
            font-size: 14px;
            padding: 20px;
        }
    </style>
</head>
<body>

<!-- TOPNAV -->
<nav class="topnav">
    <a href="dashboard.html" class="brand">TableVista</a>
    <div class="topnav-actions">
        <a href="reservation.html" class="btn-nav btn-back">← Nouvelle réservation</a>
        <a href="dashboard.html" class="btn-nav btn-home">⊞ Accueil</a>
    </div>
</nav>

<!-- CARD -->
<div class="card">
    <div class="success-icon">✅</div>
    <h2>Réservation Confirmée !</h2>
    <p class="subtitle">Votre table a été réservée avec succès. Un email de confirmation vous a été envoyé.</p>
    <div class="divider"></div>

    <div class="info-grid" id="details">
        <div class="info-row">
            <span class="key">Statut</span>
            <span class="val empty">Chargement...</span>
        </div>
    </div>

    <div class="btn-actions">
        <a href="dashboard_client.html" class="btn-primary">📋 Mes réservations</a>
        <a href="reservation.html" class="btn-secondary">➕ Nouvelle</a>
    </div>
</div>

<script>
    const r = JSON.parse(localStorage.getItem('last_reservation') || '{}');

    if (r.id) {
        document.getElementById('details').innerHTML = `
            <div class="info-row">
                <span class="key">Réservation</span>
                <span class="val" style="color:var(--gold);font-weight:600">#${r.id}</span>
            </div>
            <div class="info-row">
                <span class="key">Table</span>
                <span class="val">Table ${r.table_id}</span>
            </div>
            <div class="info-row">
                <span class="key">Date</span>
                <span class="val">${r.date}</span>
            </div>
            <div class="info-row">
                <span class="key">Heure</span>
                <span class="val">${r.heure}</span>
            </div>
            <div class="info-row">
                <span class="key">Personnes</span>
                <span class="val">${r.nb_personnes} personnes</span>
            </div>
            <div class="info-row">
                <span class="key">Statut</span>
                <span class="val"><span class="badge-statut">${r.statut}</span></span>
            </div>
        `;
    } else {
        document.getElementById('details').innerHTML =
            '<div class="info-row"><span class="val empty">Aucune réservation trouvée</span></div>';
    }
</script>
</body>
</html>
